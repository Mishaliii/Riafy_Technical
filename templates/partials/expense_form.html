<div class="modal-header">
  <h2 class="modal-title">Add Expense</h2>
  <button type="button" class="modal-close" onclick="closeModal()">✕</button>
</div>

<form hx-post="/api/expenses"
      hx-target="#modal-content"
      hx-swap="innerHTML">

  <div class="form-group">
    <label class="form-label">Title <span class="required">*</span></label>
    <input type="text" name="title" maxlength="100"
           value="{{ values.title if values else '' }}"
           placeholder="e.g. Zomato lunch" required>
    {% if errors.title %}
    <span class="form-error">{{ errors.title }}</span>
    {% endif %}
  </div>

  <div class="form-group mt-1">
    <label class="form-label">Amount (₹) <span class="required">*</span></label>
    <input type="number" name="amount" min="0.01" step="0.01"
           value="{{ values.amount if values else '' }}"
           placeholder="0.00" required>
    {% if errors.amount %}
    <span class="form-error">{{ errors.amount }}</span>
    {% endif %}
  </div>

  <div class="form-group mt-1">
    <label class="form-label">Category <span class="required">*</span></label>
    <select name="category" required>
      <option value="">Select category</option>
      {% for cat in categories %}
      <option value="{{ cat }}"
        {% if values and values.category == cat %}selected{% endif %}>
        {{ cat }}
      </option>
      {% endfor %}
    </select>
    {% if errors.category %}
    <span class="form-error">{{ errors.category }}</span>
    {% endif %}
  </div>

  <div class="form-group mt-1">
    <label class="form-label">Date</label>
    <input type="date" name="date"
           value="{{ values.date if values else today }}">
    {% if errors.date %}
    <span class="form-error">{{ errors.date }}</span>
    {% endif %}
  </div>

  <div class="form-group mt-1">
    <label class="form-label">Note <span class="text-muted">(optional)</span></label>
    <textarea name="note" rows="3" maxlength="500"
              placeholder="Optional details...">{{ values.note if values else '' }}</textarea>
    {% if errors.note %}
    <span class="form-error">{{ errors.note }}</span>
    {% endif %}
  </div>

  <div class="flex gap-3 mt-2" style="justify-content:flex-end">
    <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    <button type="submit" class="btn btn-primary">Save Expense</button>
  </div>
</form>
